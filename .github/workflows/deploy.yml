# Build the Life OS images on every push to main and publish them to GitHub
# Container Registry (ghcr.io). Watchtower on the NAS then auto-pulls the new image
# — so `git push` IS the deploy. Two images (web app + capture daemon) build in
# parallel. Runner is amd64, matching the Intel DS423+, so no multi-arch needed.
name: build-and-push

on:
  push:
    branches: [main]
  workflow_dispatch:        # lets you trigger a rebuild by hand from the Actions tab

permissions:
  contents: read
  packages: write           # push to ghcr.io using the built-in GITHUB_TOKEN

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: life-os-app
            dockerfile: deploy/Dockerfile.app
          - image: life-os-capture
            dockerfile: deploy/Dockerfile.capture
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
