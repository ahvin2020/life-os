# Life OS — Container Manager project for the Synology DS423+ (PRODUCTION).
#
# Deploy model: `git push` → GitHub Actions builds both images → ghcr.io →
# Watchtower on the NAS auto-pulls (or Stop→Build in Container Manager to pull now,
# thanks to pull_policy: always). The image IS the artifact — code is NOT bind-mounted.
#
# ONE mount, and it never round-trips through the image:
#   - DATA (/volume1/docker/projects/life-os-compose/data → /data): app.db + backups + the
#          vault (LIFEOS_VAULT_DIR=/data/vault) + the whisper model cache (HF_HOME).
#          Read-write, persisted. The two containers share this and nothing else — the vault
#          used to be a SECOND bind mount of a personal home folder, which made prod depend on
#          a DSM account and gave dev + prod one shared, Synology-Drive-synced set of notes.
#
# Secrets live in a sibling .env (chmod 600, gitignored):
#   TELEGRAM_BOT_TOKEN, TELEGRAM_ALLOWED_USER_ID
# The Claude OAuth token is NOT required here — paste it on the Settings page and both
# containers read it from the shared DB (claude_cli._resolve_token). The env var below
# is an optional override if you'd rather pin it in .env.
#
# This file mirrors /volume1/docker/projects/life-os-compose/docker-compose.yml on the
# NAS. Keep them in sync.

services:
  app:
    image: ghcr.io/ahvin2020/life-os-app:latest
    pull_policy: always
    container_name: life-os-app
    init: true                    # tini as PID 1 → forwards SIGTERM, so `docker stop` is instant
    working_dir: /app
    volumes:
      - /volume1/docker/projects/life-os-compose/data:/data:rw
    environment:
      - TZ=Asia/Singapore
      - LIFEOS_DB_PATH=/data/app.db
      - LIFEOS_VAULT_DIR=/data/vault
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
    ports:
      - "5070:5070"
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  capture:
    image: ghcr.io/ahvin2020/life-os-capture:latest
    pull_policy: always
    container_name: life-os-capture
    init: true                    # tini as PID 1 → forwards SIGTERM, so `docker stop` is instant
    working_dir: /app
    volumes:
      - /volume1/docker/projects/life-os-compose/data:/data:rw
    environment:
      - TZ=Asia/Singapore
      - LIFEOS_DB_PATH=/data/app.db
      - LIFEOS_VAULT_DIR=/data/vault
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USER_ID=${TELEGRAM_ALLOWED_USER_ID}
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN:-}
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
